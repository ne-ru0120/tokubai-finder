<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#e8462e" />
  <!-- ホーム画面アイコンは Safari ブラウザで開く（standalone の位置情報不具合を回避）。
       standalone に戻す場合は content を "yes" にする。 -->
  <meta name="apple-mobile-web-app-capable" content="no" />
  <meta name="apple-mobile-web-app-title" content="特売ファインダー" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <link rel="stylesheet" href="styles.css" />
  <title>特売ファインダー</title>
</head>
<body>
  <header class="app-header">
    <h1>🛒 特売ファインダー</h1>
    <p class="subtitle">現在地のまわりのおトクを探す</p>
  </header>

  <main class="app-main" id="view-search">
    <section class="controls" aria-label="検索条件">
      <label class="control-label" for="distance-input">
        探す範囲
        <span class="distance-value"><span id="distance-readout">1000</span> m</span>
      </label>

      <input type="range" id="distance-range" min="100" max="10000" step="100" value="1000" aria-label="距離スライダー" />

      <div class="number-row">
        <input type="number" id="distance-input" min="100" max="10000" step="100" value="1000" inputmode="numeric" />
        <span class="unit">m</span>
      </div>

      <button type="button" class="search-btn" id="search-btn">📍 現在地から探す</button>
    </section>

    <section class="status" id="status" aria-live="polite"></section>
    <div id="map" class="map" aria-label="地図" hidden></div>
    <section class="results" id="results" aria-label="検索結果"></section>
    <nav class="pager" id="pager" aria-label="ページ送り"></nav>
  </main>

  <footer class="app-footer">
    店舗位置: OpenStreetMap ／ チラシ: くふう トクバイ等へリンク
  </footer>

  <script src="app.js"></script>
</body>
</html>
